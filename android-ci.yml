name: Gerar APK de Teste

on:
  push:
    branches: [ "main", "master" ] # Executa a cada commit nas branches main ou master
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código fonte
      uses: actions/checkout@v4

    - name: Configurar o JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' # Recomendado para projetos modernos visando o SDK 36

    - name: Configurar o Cache do Gradle
      uses: gradle/actions/setup-gradle@v4

    # Passo essencial: O projeto exige um arquivo .env devido ao Secrets Plugin
    - name: Criar arquivo .env para o Build
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

    - name: Dar permissão de execução ao Gradle Wrapper
      run: chmod +x gradlew

    - name: Compilar APK de Debug
      run: ./gradlew assembleDebug

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: TaquigrafiaPro-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7 # O link do arquivo expira em 7 dias