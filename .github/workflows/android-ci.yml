name: Gerar Release de Teste

on:
  push:
    branches: [ "main", "master" ] # Executa a cada commit nas branches main ou master

jobs:
  build:
    runs-on: ubuntu-latest
    
    # IMPORTANTE: Permissão necessária para a Action conseguir criar a Release
    permissions:
      contents: write

    steps:
    - name: Checkout do código fonte
      uses: actions/checkout@v4

    - name: Configurar o JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar o Cache do Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Criar arquivo .env para o Build
      run: |
        echo "GEMINI_API_KEY=${GEMINI_API_KEY:-MY_GEMINI_API_KEY}" > .env
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Dar permissão de execução ao Gradle Wrapper
      run: chmod +x gradlew

    - name: Gerar debug.keystore para assinatura
      run: |
        keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

    - name: Compilar APK de Debug
      run: ./gradlew assembleDebug

    # Extrai os 7 primeiros caracteres do hash do commit para usar como tag
    - name: Obter Hash Curto do Commit
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Criar GitHub Release e Anexar APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ steps.vars.outputs.sha_short }}
        name: "Test Build #${{ github.run_number }} (${{ steps.vars.outputs.sha_short }})"
        body: |
          Este APK foi gerado automaticamente a partir de um novo commit.
          - **Commit:** ${{ steps.vars.outputs.sha_short }}
          - **Branch:** ${{ github.ref_name }}
          - **Data/Hora:** ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: true # Define como "Pre-release" por ser um build de desenvolvimento
        files: app/build/outputs/apk/debug/app-debug.apk
